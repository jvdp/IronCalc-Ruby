name: docs
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # tags needed for the versioned build
          fetch-tags: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      # YARD parses Ruby source only, so no extension compile is needed.
      - run: gem install yard kramdown

      - name: Validate docs build
        run: yard doc --no-output

      # Group by engine version (first 3 segments): build each engine version's
      # highest tag into /<engine>/, mirror the newest at the root.
      - name: Build versioned site
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          rm -rf site && mkdir -p site
          declare -A best
          for tag in $(git tag -l 'v*' | sort -V); do
            best["$(echo "${tag#v}" | cut -d. -f1-3)"]="$tag"
          done
          latest=""
          for eng in $(printf '%s\n' "${!best[@]}" | sort -V); do
            src=$(mktemp -d)
            git archive "${best[$eng]}" | tar -x -C "$src"
            [ -f "$src/lib/ironcalc/native_methods.rb" ] || { echo "skip $eng (no doc setup)"; continue; }
            (cd "$src" && yard doc) && cp -r "$src/doc" "site/$eng"
            latest=$eng
          done
          [ -n "$latest" ] || { echo "no documentable versions"; exit 1; }
          cp -r "site/$latest/." site/
          {
            echo '<!doctype html><meta charset="utf-8"><title>IronCalc Ruby docs</title>'
            echo '<h1>IronCalc Ruby — documentation</h1><ul>'
            for eng in $(printf '%s\n' "${!best[@]}" | sort -Vr); do
              [ -d "site/$eng" ] && echo "<li><a href=\"./$eng/\">$eng</a></li>"
            done
            echo '</ul>'
          } > site/versions.html

      - uses: actions/configure-pages@v5
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
      - uses: actions/upload-pages-artifact@v3
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          path: site

  deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
