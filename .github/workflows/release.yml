name: release

# Cross-compiles precompiled native gems for every supported platform (the
# nokogiri model, via rb-sys + rb-sys-dock) and publishes them — together with
# the pure-source fallback gem — to rubygems.org through Trusted Publishing,
# which also produces the SigStore build-provenance attestation (the green
# "provenance" badge on rubygems.org).
#
# Triggered by pushing a version tag (e.g. `v0.7.1.1`). Use workflow_dispatch
# (with `dry_run: true`, the default) to build every gem without publishing.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build gems but do not push to rubygems.org"
        type: boolean
        default: true

jobs:
  # One precompiled gem per platform. Each gem bundles a .so for every Ruby ABI
  # listed in `ruby-versions`, matching the version-aware require in
  # lib/ironcalc.rb (`ironcalc/#{RUBY_VERSION.to_f}/ironcalc_ruby`).
  cross-gems:
    name: cross-gem (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - x86_64-linux-musl
          - aarch64-linux
          - aarch64-linux-musl
          - x86_64-darwin
          - arm64-darwin
          - x64-mingw-ucrt
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - uses: oxidize-rb/actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.0,3.1,3.2,3.3,3.4,4.0"

      - uses: actions/upload-artifact@v7
        with:
          name: cross-gem-${{ matrix.platform }}
          path: pkg/*.gem
          if-no-files-found: error

  # The pure-source gem: the fallback RubyGems installs on any platform we did
  # not precompile (it compiles the Rust extension from crates.io on install).
  source-gem:
    name: source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec rake changelog:check
      - run: bundle exec rake build
      - uses: actions/upload-artifact@v7
        with:
          name: source-gem
          path: pkg/*.gem
          if-no-files-found: error

  publish:
    name: publish to rubygems.org
    needs: [cross-gems, source-gem]
    runs-on: ubuntu-latest
    # Only publish for a real tag push; workflow_dispatch is build-only unless
    # dry_run is explicitly set to false.
    if: github.event_name == 'push' || inputs.dry_run == false
    permissions:
      contents: read
      # Required for Trusted Publishing (OIDC) and the SigStore attestation.
      id-token: write
    steps:
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v8
        with:
          path: pkg
          merge-multiple: true

      # Keyless auth via OIDC. Requires the `ironcalc` gem to have this repo
      # registered as a Trusted Publisher on rubygems.org first (no secret, no
      # inputs).
      - uses: rubygems/configure-rubygems-credentials@v2.1.0

      # Released `gem push` only attests when handed an explicit `--attestation`
      # file (auto-attestation is unreleased/master-only), so sign each gem
      # ourselves. sigstore signing is keyless via the job's OIDC identity. The
      # attestation is what yields the rubygems.org provenance badge.
      - name: Sign and push gems
        run: |
          for gem in pkg/*.gem; do
            echo "Signing $gem"
            gem exec sigstore-cli:0.2.3 sign "$gem" --bundle "$gem.sigstore.json"
            echo "Pushing $gem"
            gem push "$gem" --attestation "$gem.sigstore.json"
          done

  # Notes come from the CHANGELOG section for this version; the built gems are
  # attached as assets. After `publish` so the release only appears once the
  # gems are live.
  github-release:
    name: GitHub release
    needs: [publish]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      # Tag is `v1.2.3`; the changelog heading is `1.2.3`.
      - name: Extract release notes from CHANGELOG.md
        run: bundle exec rake changelog:extract VERSION="${GITHUB_REF_NAME#v}" > RELEASE_NOTES.md

      - uses: actions/download-artifact@v8
        with:
          path: pkg
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            pkg/*.gem
